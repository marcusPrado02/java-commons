name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve versions from tag
        id: versions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          RELEASE="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE"
          NEXT_SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "next-snapshot=$NEXT_SNAPSHOT" >> $GITHUB_OUTPUT
          echo "Release: $RELEASE  →  Next: $NEXT_SNAPSHOT"

      - name: Set release version in POMs
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.release }}
        run: |
          ./mvnw -B versions:set -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false

      - name: Build and test
        run: ./mvnw -B clean verify

      - name: Deploy to GitHub Packages
        run: ./mvnw -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key for Maven Central
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        # -P release activates: sources jar, javadoc jar, GPG signing, central-publishing-maven-plugin
        run: ./mvnw -B deploy -DskipTests -P release
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            Maven artifacts are available in [GitHub Packages](https://github.com/marcusPrado02/java-commons/packages).

            ### Usage
            ```xml
            <dependency>
              <groupId>com.marcusprado02.commons</groupId>
              <artifactId>commons-bom</artifactId>
              <version>${{ steps.versions.outputs.release }}</version>
              <type>pom</type>
              <scope>import</scope>
            </dependency>
            ```
          draft: false
          prerelease: false

      - name: Bump to next development version
        env:
          NEXT_SNAPSHOT: ${{ steps.versions.outputs.next-snapshot }}
        run: |
          ./mvnw -B versions:set -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false
          git add pom.xml '**/pom.xml'
          git commit -m "chore: prepare $NEXT_SNAPSHOT"
          git push origin HEAD:main

      - name: Generate aggregated Javadoc
        run: ./mvnw -B javadoc:aggregate -DskipTests -Dmaven.javadoc.failOnError=false
        env:
          MAVEN_OPTS: -Xmx2g

      - name: Upload Javadoc for GitHub Pages
        if: hashFiles('target/site/apidocs/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/apidocs

      - name: Deploy Javadoc to GitHub Pages
        if: hashFiles('target/site/apidocs/index.html') != ''
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
